[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash -c 'DB_REAPING_FREQUENCY=0 bundle exec rails db:migrate && DB_REAPING_FREQUENCY=0 bundle exec rails runner db/cleanup_mac_test_usage.rb && exec bundle exec puma -C config/puma.rb'"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
